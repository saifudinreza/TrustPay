services:
  - type: web
    name: trustpay-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    buildContext: ./backend
    plan: free
    envVars:
      - key: APP_NAME
        value: TrustPay
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: OTP_CHANNEL
        value: log
      # Set these manually in Render dashboard (sensitive):
      # APP_KEY            → output of: php artisan key:generate --show
      # APP_URL            → https://trustpay-api.onrender.com  (isi setelah deploy)
      # FRONTEND_URL       → https://your-project.vercel.app
      # MIDTRANS_SERVER_KEY, MIDTRANS_CLIENT_KEY
      # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
      # GOOGLE_REDIRECT_URI → https://trustpay-api.onrender.com/api/auth/google/callback
      # MAIL_MAILER        → smtp
      # MAIL_SCHEME        → null
      # MAIL_HOST          → smtp.gmail.com
      # MAIL_PORT          → 587
      # MAIL_USERNAME      → donojomi@gmail.com
      # MAIL_PASSWORD      → (app password gmail)
      # MAIL_FROM_ADDRESS  → donojomi@gmail.com
      # MAIL_FROM_NAME     → TrustPay
